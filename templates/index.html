<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #333;
        }

        label .optional {
            color: #999;
            font-weight: 400;
        }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #333;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.15s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .loading .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #ddd;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-status {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .loading-detail {
            font-size: 13px;
            color: #999;
        }

        .word-count {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .result {
            display: none;
            margin-top: 32px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .copy-btn {
            width: auto;
            padding: 6px 14px;
            font-size: 13px;
            margin: 0;
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }

        .copy-btn:hover { background: #f5f5f5; }

        .context-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .context-tag {
            font-size: 12px;
            padding: 3px 10px;
            background: #e8e8e8;
            border-radius: 12px;
            color: #555;
        }

        .case-study {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 32px;
        }

        .case-study h1 { font-size: 20px; margin-top: 28px; margin-bottom: 8px; }
        .case-study h2 { font-size: 17px; margin-top: 24px; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .case-study h3 { font-size: 15px; margin-top: 20px; margin-bottom: 6px; }
        .case-study p { margin-bottom: 12px; }
        .case-study ul, .case-study ol { padding-left: 20px; margin-bottom: 12px; }
        .case-study li { margin-bottom: 4px; }
        .case-study strong { color: #111; }
        .case-study blockquote { border-left: 3px solid #ddd; padding-left: 16px; color: #555; margin: 12px 0; }

        .error-msg {
            color: #c0392b;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        .quality-bar {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding: 10px 16px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
        }

        .quality-bar .score {
            font-weight: 600;
            color: #333;
        }

        .quality-bar .score.high { color: #27ae60; }
        .quality-bar .score.mid { color: #f39c12; }
        .quality-bar .score.low { color: #c0392b; }

        /* Apply section */
        .apply-section {
            display: none;
            margin-top: 32px;
            padding: 24px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .apply-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .apply-section .apply-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
        }

        .apply-section textarea {
            min-height: 120px;
        }

        .apply-btn {
            background: #1a6b3a;
        }

        .apply-result {
            display: none;
            margin-top: 32px;
        }

        .apply-result .case-study {
            border-color: #b8d4c8;
        }

        .apply-loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .apply-loading .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #ddd;
            border-top-color: #1a6b3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .apply-warnings {
            margin-bottom: 12px;
        }

        .apply-warning {
            font-size: 13px;
            color: #856404;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 6px;
        }

        .apply-quality-bar {
            display: flex;
            gap: 16px;
            padding: 10px 16px;
            background: #f0f7f4;
            border: 1px solid #b8d4c8;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 16px;
        }

        .apply-quality-bar .match-count {
            font-weight: 600;
        }

        .apply-quality-bar .match-count.high { color: #27ae60; }
        .apply-quality-bar .match-count.mid { color: #f39c12; }
        .apply-quality-bar .match-count.low { color: #c0392b; }
        .apply-quality-bar .match-count.none { color: #999; }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 32px 0;
        }

        .file-upload {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .file-upload input[type="file"] {
            font-size: 13px;
            color: #555;
        }

        .file-upload input[type="file"]::file-selector-button {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .file-upload input[type="file"]::file-selector-button:hover {
            background: #f5f5f5;
        }

        .file-name {
            font-size: 12px;
            color: #27ae60;
            font-weight: 500;
        }

        .or-divider {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Case Study Generator</h1>
        <p class="subtitle">Paste a job description and generate a tailored case study for your application.</p>

        <form id="form">
            <div class="row">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="company_name" placeholder="Stripe" required>
                </div>
                <div class="form-group">
                    <label>Domain <span class="optional">(optional)</span></label>
                    <input type="text" id="domain" placeholder="stripe.com">
                </div>
            </div>

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" id="job_title" placeholder="Head of Growth Marketing">
            </div>

            <div class="form-group">
                <label>Job Description</label>
                <textarea id="jd_text" placeholder="Paste the full job description here..." required></textarea>
            </div>

            <div class="form-group">
                <label>Your CV / Resume <span class="optional">(for apply step)</span></label>
                <div class="file-upload">
                    <input type="file" id="cv_file" accept=".pdf,.txt,.doc,.docx,.md">
                    <span class="file-name" id="cv-file-name"></span>
                </div>
                <p class="or-divider">or paste below</p>
                <textarea id="cv_text" placeholder="Paste your CV or resume text here. Used after generation to create a personalized application document."></textarea>
            </div>

            <button type="submit" id="submit-btn">Generate Case Study</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-status" id="loading-status">Starting...</p>
            <p class="loading-detail" id="loading-detail"></p>
            <p class="word-count" id="word-count"></p>
        </div>

        <div class="result" id="result">
            <div class="result-header">
                <h2>Your Case Study</h2>
                <button class="copy-btn" id="copy-btn">Copy Markdown</button>
            </div>
            <div class="context-bar" id="context-bar"></div>
            <div class="case-study" id="case-study"></div>
            <div class="quality-bar" id="quality-bar" style="display:none;"></div>
        </div>

        <!-- Apply section: appears after case generation -->
        <div class="apply-section" id="apply-section">
            <h2>Apply with this case</h2>
            <p class="apply-subtitle">Transform this case into a proactive application document using your CV.</p>

            <form id="apply-form">
                <button type="submit" class="apply-btn" id="apply-btn">Generate Application Document</button>
            </form>
        </div>

        <div class="apply-loading" id="apply-loading">
            <div class="spinner"></div>
            <p class="loading-status" id="apply-loading-status">Preparing...</p>
            <p class="loading-detail" id="apply-loading-detail" style="font-size:13px;color:#999;"></p>
            <p class="word-count" id="apply-word-count"></p>
        </div>

        <div class="apply-result" id="apply-result">
            <div class="result-header">
                <h2>Your Application Document</h2>
                <button class="copy-btn" id="copy-apply-btn">Copy Markdown</button>
            </div>
            <div class="apply-warnings" id="apply-warnings"></div>
            <div class="apply-quality-bar" id="apply-quality-bar" style="display:none;"></div>
            <div class="case-study" id="apply-output"></div>
        </div>
    </div>

    <script>
        let rawMarkdown = '';
        let applyMarkdown = '';
        // Store form values for reuse in apply step
        let storedCompanyName = '';
        let storedJobTitle = '';
        let storedJdText = '';
        let storedCvText = '';

        const STATUS_MESSAGES = {
            decomposing: 'Analyzing job description...',
            researching: 'Researching company...',
            analyzing: 'Analyzing data...',
            diagnosis: 'Diagnosing business challenges...',
            generating: 'Generating case study...',
        };

        function renderContextTags(ctx) {
            const bar = document.getElementById('context-bar');
            bar.innerHTML = '';
            const tags = [
                ctx.business_model,
                ctx.growth_stage,
                ctx.seniority,
                ctx.funding_stage !== 'unknown' ? ctx.funding_stage : null,
            ];
            if (ctx.competitors && ctx.competitors.length) {
                tags.push('vs ' + ctx.competitors.join(', '));
            }
            if (ctx.marketing_channels && ctx.marketing_channels.length) {
                tags.push(ctx.marketing_channels.join(', '));
            }
            tags.forEach(t => {
                if (t && t !== 'unknown') {
                    const span = document.createElement('span');
                    span.className = 'context-tag';
                    span.textContent = t;
                    bar.appendChild(span);
                }
            });
        }

        function countWords(text) {
            return text.trim().split(/\s+/).filter(w => w.length > 0).length;
        }

        function renderQuality(quality) {
            const bar = document.getElementById('quality-bar');
            if (!quality || !quality.specificity) return;

            function scoreClass(val) {
                if (val >= 7) return 'high';
                if (val >= 5) return 'mid';
                return 'low';
            }

            bar.innerHTML =
                `<span>Specificity: <span class="score ${scoreClass(quality.specificity)}">${quality.specificity}/10</span></span>` +
                `<span>Realism: <span class="score ${scoreClass(quality.realism)}">${quality.realism}/10</span></span>` +
                `<span>Difficulty: <span class="score ${scoreClass(quality.difficulty)}">${quality.difficulty}/10</span></span>`;
            bar.style.display = 'flex';
        }

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = document.getElementById('form');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const btn = document.getElementById('submit-btn');
            const statusEl = document.getElementById('loading-status');
            const detailEl = document.getElementById('loading-detail');
            const wordCountEl = document.getElementById('word-count');
            const caseStudyEl = document.getElementById('case-study');

            form.style.display = 'none';
            result.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;
            rawMarkdown = '';
            caseStudyEl.innerHTML = '';
            statusEl.textContent = 'Starting...';
            detailEl.textContent = '';
            wordCountEl.textContent = '';
            document.getElementById('quality-bar').style.display = 'none';

            const payload = JSON.stringify({
                company_name: document.getElementById('company_name').value,
                domain: document.getElementById('domain').value,
                job_title: document.getElementById('job_title').value,
                jd_text: document.getElementById('jd_text').value,
            });

            // Store for apply step
            storedCompanyName = document.getElementById('company_name').value;
            storedJobTitle = document.getElementById('job_title').value;
            storedJdText = document.getElementById('jd_text').value;
            storedCvText = document.getElementById('cv_text').value;

            try {
                const response = await fetch('/generate-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload,
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Request failed');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let streaming = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);

                        if (data === '[DONE]') {
                            // Finalize
                            loading.style.display = 'none';
                            if (rawMarkdown) {
                                caseStudyEl.innerHTML = marked.parse(rawMarkdown);
                            }
                            result.style.display = 'block';
                            continue;
                        }

                        let parsed;
                        try { parsed = JSON.parse(data); } catch { continue; }

                        if (parsed.error) {
                            loading.style.display = 'none';
                            result.style.display = 'block';
                            caseStudyEl.innerHTML = '<p class="error-msg">' + parsed.error + '</p>';
                            form.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }

                        if (parsed.stage) {
                            statusEl.textContent = STATUS_MESSAGES[parsed.stage] || parsed.stage;
                            if (parsed.stage === 'decomposing') {
                                detailEl.textContent = 'Extracting company profile and requirements map...';
                            } else if (parsed.stage === 'researching') {
                                detailEl.textContent = 'Querying Exa + Firecrawl APIs...';
                            } else if (parsed.stage === 'analyzing') {
                                detailEl.textContent = 'Building context and inferring challenges...';
                            } else if (parsed.stage === 'diagnosis') {
                                detailEl.textContent = 'Stage 1 of 2 — analyzing growth challenges...';
                            } else if (parsed.stage === 'generating') {
                                detailEl.textContent = 'Stage 2 of 2 — writing case study...';
                                // Show result area with streaming content
                                loading.style.display = 'none';
                                result.style.display = 'block';
                                streaming = true;
                            }
                        }

                        if (parsed.context) {
                            renderContextTags(parsed.context);
                        }

                        if (parsed.quality) {
                            renderQuality(parsed.quality);
                        }

                        if (parsed.chunk) {
                            rawMarkdown += parsed.chunk;
                            // Re-render periodically (every ~20 chars to avoid excessive DOM updates)
                            if (streaming) {
                                caseStudyEl.innerHTML = marked.parse(rawMarkdown);
                                wordCountEl.textContent = countWords(rawMarkdown) + ' words';
                                // Auto-scroll to bottom
                                window.scrollTo(0, document.body.scrollHeight);
                            }
                        }
                    }
                }

                // Final render
                if (rawMarkdown) {
                    caseStudyEl.innerHTML = marked.parse(rawMarkdown);
                    wordCountEl.textContent = countWords(rawMarkdown) + ' words — done';
                }
                result.style.display = 'block';
                // Show apply section
                document.getElementById('apply-section').style.display = 'block';

            } catch (err) {
                loading.style.display = 'none';
                form.style.display = 'block';
                btn.disabled = false;
                alert('Request failed: ' + err.message);
            }
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(rawMarkdown).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy Markdown'; }, 2000);
            });
        });

        // --- Apply flow ---

        // File upload handler: read file and populate CV textarea
        document.getElementById('cv_file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const nameEl = document.getElementById('cv-file-name');
            const textarea = document.getElementById('cv_text');
            nameEl.textContent = file.name;

            if (file.type === 'application/pdf') {
                try {
                    nameEl.textContent = file.name + ' (extracting text...)';
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const strings = content.items.map(item => item.str);
                        fullText += strings.join(' ') + '\n\n';
                    }
                    fullText = fullText.trim();
                    if (fullText.length > 100) {
                        textarea.value = fullText;
                        nameEl.textContent = file.name + ' (text extracted)';
                    } else {
                        nameEl.textContent = file.name + ' (no text found — paste below)';
                        textarea.placeholder = 'PDF has no extractable text. Please paste your CV text here...';
                    }
                } catch (err) {
                    console.error('PDF extraction error:', err);
                    nameEl.textContent = file.name + ' (extraction failed — paste below)';
                }
            } else {
                // Plain text, markdown, doc-like
                try {
                    const text = await file.text();
                    textarea.value = text;
                } catch {
                    nameEl.textContent = file.name + ' (could not read)';
                }
            }
        });

        document.getElementById('apply-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Re-read CV textarea in case user updated it after case generation
            const cvText = (document.getElementById('cv_text').value || storedCvText).trim();
            if (!cvText) { alert('No CV loaded. Go back and paste or upload your CV before generating.'); return; }
            storedCvText = cvText;  // Update stored value

            const applySection = document.getElementById('apply-section');
            const applyLoading = document.getElementById('apply-loading');
            const applyResult = document.getElementById('apply-result');
            const applyOutput = document.getElementById('apply-output');
            const applyWordCount = document.getElementById('apply-word-count');
            const applyBtn = document.getElementById('apply-btn');
            const applyStatus = document.getElementById('apply-loading-status');
            const applyDetail = document.getElementById('apply-loading-detail');

            applyBtn.disabled = true;
            applySection.style.display = 'none';
            applyResult.style.display = 'none';
            applyLoading.style.display = 'block';
            applyStatus.textContent = 'Preparing...';
            applyDetail.textContent = '';
            applyMarkdown = '';
            applyOutput.innerHTML = '';
            applyWordCount.textContent = '';
            document.getElementById('apply-warnings').innerHTML = '';
            document.getElementById('apply-quality-bar').style.display = 'none';

            const APPLY_STATUS = {
                extracting_profile: 'Extracting profile from CV...',
                analyzing_case: 'Analyzing case structure...',
                mapping: 'Mapping your experience to case tasks...',
                generating: 'Writing application document...',
            };

            const payload = JSON.stringify({
                case_study: rawMarkdown,
                jd_text: storedJdText,
                company_name: storedCompanyName,
                job_title: storedJobTitle,
                cv_text: cvText,
            });

            try {
                const response = await fetch('/apply-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload,
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Request failed');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let streaming = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);

                        if (data === '[DONE]') {
                            applyLoading.style.display = 'none';
                            if (applyMarkdown) {
                                applyOutput.innerHTML = marked.parse(applyMarkdown);
                            }
                            applyResult.style.display = 'block';
                            continue;
                        }

                        let parsed;
                        try { parsed = JSON.parse(data); } catch { continue; }

                        if (parsed.error) {
                            applyLoading.style.display = 'none';
                            applyResult.style.display = 'block';
                            applyOutput.innerHTML = '<p class="error-msg">' + parsed.error + '</p>';
                            applySection.style.display = 'block';
                            applyBtn.disabled = false;
                            return;
                        }

                        if (parsed.stage) {
                            const msg = APPLY_STATUS[parsed.stage];
                            if (msg) {
                                applyStatus.textContent = msg;
                            }
                            if (parsed.stage === 'extracting_profile') {
                                applyDetail.textContent = 'Step 1 of 4 — reading your CV...';
                            } else if (parsed.stage === 'analyzing_case') {
                                applyDetail.textContent = 'Step 2 of 4 — extracting case tasks and challenges...';
                            } else if (parsed.stage === 'mapping') {
                                applyDetail.textContent = 'Step 3 of 4 — matching your experience to each task...';
                            } else if (parsed.stage === 'generating') {
                                applyDetail.textContent = 'Step 4 of 4 — writing with structured context...';
                                applyLoading.style.display = 'none';
                                applyResult.style.display = 'block';
                                streaming = true;
                            }
                        }

                        if (parsed.profile) {
                            const name = parsed.profile.nombre || '';
                            if (name) {
                                applyDetail.textContent = 'Profile extracted: ' + name;
                            }
                        }

                        if (parsed.warning) {
                            const warningsEl = document.getElementById('apply-warnings');
                            const div = document.createElement('div');
                            div.className = 'apply-warning';
                            div.textContent = parsed.warning;
                            warningsEl.appendChild(div);
                        }

                        if (parsed.mapping_quality) {
                            const q = parsed.mapping_quality;
                            const bar = document.getElementById('apply-quality-bar');
                            const total = (q.alto || 0) + (q.medio || 0) + (q.bajo || 0) + (q.ninguno || 0);
                            if (total > 0) {
                                bar.innerHTML =
                                    `<span>Experience match: </span>` +
                                    `<span><span class="match-count high">${q.alto || 0}</span> strong</span>` +
                                    `<span><span class="match-count mid">${q.medio || 0}</span> method</span>` +
                                    `<span><span class="match-count low">${q.bajo || 0}</span> adjacent</span>` +
                                    `<span><span class="match-count none">${q.ninguno || 0}</span> none</span>`;
                                bar.style.display = 'flex';
                            }
                            applyDetail.textContent = `Step 3 of 4 — ${q.alto || 0} strong + ${q.medio || 0} method matches found`;
                        }

                        if (parsed.chunk) {
                            applyMarkdown += parsed.chunk;
                            if (streaming) {
                                applyOutput.innerHTML = marked.parse(applyMarkdown);
                                applyWordCount.textContent = countWords(applyMarkdown) + ' words';
                                window.scrollTo(0, document.body.scrollHeight);
                            }
                        }
                    }
                }

                // Final render
                if (applyMarkdown) {
                    applyOutput.innerHTML = marked.parse(applyMarkdown);
                    applyWordCount.textContent = countWords(applyMarkdown) + ' words — done';
                }
                applyResult.style.display = 'block';
                applyBtn.disabled = false;

            } catch (err) {
                applyLoading.style.display = 'none';
                applySection.style.display = 'block';
                applyBtn.disabled = false;
                alert('Apply request failed: ' + err.message);
            }
        });

        document.getElementById('copy-apply-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(applyMarkdown).then(() => {
                const btn = document.getElementById('copy-apply-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = 'Copy Markdown'; }, 2000);
            });
        });
    </script>
</body>
</html>
